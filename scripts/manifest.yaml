name: "wechat_tool"
description: "微信客户端自动化控制工具：支持截图、OCR识别、点击、输入、滚动、获取页面上下文等功能。"
parameters:
  type: object
  properties:
    action:
      type: string
      enum:
        [
          "screenshot",
          "get_ocr_result",
          "click_coordinate",
          "click_and_type",
          "scroll",
          "get_page_context"
        ]
      description: "执行动作"

    save_path:
      type: string
      description: "截图保存路径（screenshot 可选，默认返回 base64）"

    keyword:
      type: string
      description: "OCR 搜索关键词（get_ocr_result 可选）"

    include_all:
      type: boolean
      description: "是否返回所有 OCR 结果（get_ocr_result 可选，默认 true）"

    x:
      type: number
      description: "X 坐标（click_coordinate 必填，click_and_type 可选）"

    y:
      type: number
      description: "Y 坐标（click_coordinate 必填，click_and_type 可选）"

    clicks:
      type: integer
      description: "点击次数（click_coordinate 可选，默认 1）"

    button:
      type: string
      enum: ["left", "right", "middle"]
      description: "鼠标按钮（click_coordinate 可选，默认 left）"

    interval:
      type: number
      description: "多次点击间隔秒数（click_coordinate 可选，默认 0.1）"

    content:
      type: string
      description: "输入内容（click_and_type 必填）"

    clear_before:
      type: boolean
      description: "输入前是否清空（click_and_type 可选，默认 true）"

    send_enter:
      type: boolean
      description: "输入后是否按回车（click_and_type 可选，默认 false）"

    auto_locate_input:
      type: boolean
      description: "是否自动定位输入框（click_and_type 可选，默认 false）"

    offset_x:
      type: number
      description: "输入框 X 方向相对位置 0.0-1.0（click_and_type 可选，默认 0.4）"

    offset_y:
      type: number
      description: "输入框 Y 方向相对位置 0.0-1.0（click_and_type 可选，默认 0.95）"

    direction:
      type: string
      enum: ["up", "down"]
      description: "滚动方向（scroll 可选，默认 down）"

    amount:
      type: integer
      description: "滚动量（scroll 可选，默认 300）"

    include_ocr:
      type: boolean
      description: "是否包含 OCR 结果（get_page_context 可选，默认 true）"

    include_controls:
      type: boolean
      description: "是否包含控件信息（get_page_context 可选，默认 true）"

    format_for_model:
      type: boolean
      description: "是否格式化为适合模型的文本（get_page_context 可选，默认 false）"

    max_items:
      type: integer
      description: "每类最大返回数量（get_page_context 可选，默认 50）"

  required: ["action"]
